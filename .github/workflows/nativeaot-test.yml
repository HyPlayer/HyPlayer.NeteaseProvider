name: NativeAOT Test
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
    
jobs:
  test-aot:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Clone PlayCore sibling
        run: git clone --depth 1 https://github.com/HyPlayer/HyPlayer.PlayCore.git ../HyPlayer.PlayCore
  
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          
      - name: Write Secret into file
        uses: "DamianReeves/write-file-action@master"
        with:
          path: HyPlayer.NeteaseProvider.Tests/Secrets.cs
          write-mode: overwrite
          contents: |
            ${{ secrets.NETEASE_LOGIN_SECRET }}
            
      - name: Restore
        run: dotnet restore HyPlayer.NeteaseProvider.Tests/HyPlayer.NeteaseProvider.Tests.csproj -r linux-x64
  
      - name: Publish with AOT
        run: dotnet publish HyPlayer.NeteaseProvider.Tests/HyPlayer.NeteaseProvider.Tests.csproj -c Release -f net10.0 -r linux-x64 --no-restore
  
      - name: Run AOT tests
        run: ./HyPlayer.NeteaseProvider.Tests/bin/Release/net10.0/linux-x64/publish/HyPlayer.NeteaseProvider.Tests
